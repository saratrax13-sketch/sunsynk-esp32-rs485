# Copy this file to secrets.yaml and fill in your own values.
# Do not commit your real secrets.yaml.

# Wi-Fi used by the Sunsynk ESP32 configuration.
wifi_ssid2: "YOUR_WIFI_SSID"
wifi_password2: "YOUR_WIFI_PASSWORD"

# Static network settings for the ESP32.
# Remove the manual_ip block from the ESPHome YAML if you prefer DHCP.
device_static_ip: "192.168.1.212"
network_gateway: "192.168.1.1"
network_subnet: "255.255.255.0"
network_dns1: "192.168.1.1"

# MQTT broker used by ESPHome.
mqtt_broker: "192.168.1.10"
mqtt_username: "YOUR_MQTT_USERNAME"
mqtt_password: "YOUR_MQTT_PASSWORD"
mqtt_port: 1883

# Native ESPHome API and OTA secrets.
sunsynk_api_encryption_key: "YOUR_ESPHOME_API_ENCRYPTION_KEY"
sunsynk_ota_password: "YOUR_OTA_PASSWORD"

# ESPHome fallback access point password.
fallback_ap_password_ss: "CHANGE_ME_FALLBACK_AP_PASSWORD"

# Optional ESPHome web server credentials.
web_server_username: "admin"
web_server_password: "CHANGE_ME_WEB_SERVER_PASSWORD"
