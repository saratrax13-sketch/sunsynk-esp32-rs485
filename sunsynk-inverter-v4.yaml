substitutions:
  device_name: sunsynk-inverter
  friendly_name: Sunsynk Inverter
  device_description: "ESP32 RS485 bridge for monitoring and controlling a Sunsynk inverter via ESPHome, MQTT, and Home Assistant."
  tx_pin: GPIO16
  rx_pin: GPIO17
  flow_control_pin: GPIO18
  generator_min_valid_power_w: "1600"
  modbus_update_interval: 10s
  modbus_command_throttle: 500ms
  modbus_send_wait_time: 500ms

# File version: v4.1 - isolated reads with slower RS485 timing
# Date updated: 2026-05-15
#
# Why this version exists:
# - Earlier versions could read and write, but grouped Modbus range reads sometimes
#   returned shifted/corrupt values on this inverter.
# - v4 keeps the working write fix: use_write_multiple: true on writable registers.
# - v4 keeps decimal display improvements: accuracy_decimals: 2 on voltage/current/
#   frequency/energy sensors where useful.
# - v4 uses force_new_range: true very broadly so most Modbus values are read in
#   separate requests. This is a little slower, but it stopped values being applied
#   to the wrong sensors.
# - MQTT keepalive was reduced to 15s so disconnects are detected faster.
# - MQTT reboot_timeout is set to 0s so the ESP32 does not reboot just because
#   MQTT disconnects.
# - MQTT retain is explicitly disabled on writable switches/selects/numbers.
#   Retained writable state messages can be replayed by MQTT/Home Assistant
#   after reconnects and look like real changes.
# - v4.1 slows RS485 request pacing after logs still showed shifted/corrupt
#   values such as impossible battery SOC and PV voltage readings.
#
# Polling notes:
# - The main Modbus controller update_interval is ${modbus_update_interval}.
# - No skip_updates means the item is checked every scan.
# - skip_updates: 11 means the item updates every 12 scans.
# - skip_updates: 59 means the item updates every 60 scans.
# - skip_updates: 119 means the item updates every 120 scans.
# - Modbus is serial, so values update one after another, not all at exactly the
#   same instant.

# ESPHome node identity shown in ESPHome Builder and Home Assistant.
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: ${device_description}

# ESP32 board and framework choice.
esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.0"
      sram1_as_iram: true

# Logging levels. Modbus internals are kept quiet unless troubleshooting is needed.
logger:
  level: INFO
  logs:
    modbus: ERROR
    modbus_controller: ERROR
    mqtt: ERROR
    api: ERROR
    sensor: INFO
    number: INFO
    select: INFO
    text_sensor: INFO

# Native Home Assistant API connection.
api:
  encryption:
    key: !secret sunsynk_api_encryption_key

# OTA lets ESPHome update the ESP32 over Wi-Fi after the first flash.
ota:
  - platform: esphome
    password: !secret sunsynk_ota_password

# Wi-Fi connection. The static IP makes the inverter bridge easy to find.
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  manual_ip:
    static_ip: !secret device_static_ip
    gateway: !secret network_gateway
    subnet: !secret network_subnet
    dns1: !secret network_dns1
  ap:
    ssid: "Sunsynk Fallback Hotspot"
    password: !secret fallback_ap_password_ss

# MQTT publishing is enabled in addition to the native Home Assistant API.
mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  port: !secret mqtt_port
  topic_prefix: sunsynk_inverter
  keepalive: 15s        # detect disconnections faster (default is 60s)
  reboot_timeout: 0s    # do NOT reboot the ESP on MQTT disconnect; prevents false state changes

# Small web page on the ESP32 for quick local status checks.
web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

# UART wiring from ESP32 to the RS485 converter.
# GPIO16 = TX from ESP32 to converter, GPIO17 = RX from converter to ESP32.
uart:
  - id: mod_uart
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}
    baud_rate: 9600
    stop_bits: 1
    rx_buffer_size: 512

# RS485/Modbus bus settings.
# flow_control_pin controls DE/RE on the RS485 adapter so the ESP32 can switch
# between transmit and receive.
modbus:
  - id: modbus1
    uart_id: mod_uart
    flow_control_pin: ${flow_control_pin}
    send_wait_time: ${modbus_send_wait_time}

# Sunsynk inverter Modbus slave.
# address: 1 must match the inverter Modbus ID.
# command_throttle spaces requests apart to avoid overrunning the inverter.
modbus_controller:
  - id: sunsynk
    address: 1
    modbus_id: modbus1
    setup_priority: -10
    update_interval: ${modbus_update_interval}
    command_throttle: ${modbus_command_throttle}
    offline_skip_updates: 3

# Sensors below are mostly Modbus holding-register reads.
# force_new_range: true is intentionally used broadly in v4 to isolate reads and
# avoid byte-shift/corrupt grouped reads on this inverter.
sensor:
  # ESP32 diagnostics. These do not use RS485 and do not affect inverter polling.
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic
    disabled_by_default: true

  - platform: uptime
    name: "Uptime"
    update_interval: 60s
    entity_category: diagnostic
    disabled_by_default: true

  # Battery live values.
  # SOC is percent. Power is W: positive means discharging, negative means charging.
  # Voltage/current use scaling filters and publish two decimals.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Battery SOC"
    id: battery_soc
    address: 184
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Battery Power"
    id: battery_power
    address: 190
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Battery Voltage"
    address: 183
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Battery Current"
    address: 191
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Battery Temperature"
    address: 182
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "Â°C"
    device_class: temperature
    state_class: measurement
    skip_updates: 11
    filters:
      - multiply: 0.1
      - offset: -100.0

  # Solar PV live values.
  # PV1/PV2 power are read directly; voltage/current use 0.1 scaling.
  # Total Solar Power later adds PV1 + PV2 for dashboard cards.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "PV1 Power"
    id: pv1_power
    address: 186
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "PV2 Power"
    id: pv2_power
    address: 187
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "PV1 Voltage"
    address: 109
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "PV1 Current"
    address: 110
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "PV2 Voltage"
    address: 111
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "PV2 Current"
    address: 112
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.1

  # Grid live values.
  # Grid CT Power is the main CT reading. Grid L1 Power is kept because
  # the Sunsynk power-flow card may use it better for the grid branch on this model.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Grid Voltage"
    address: 150
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Grid Current"
    address: 160
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Grid Frequency"
    address: 79
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    skip_updates: 11
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Grid L1 Power"
    address: 167
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Grid Power"
    id: grid_power
    address: 169
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Grid CT Power"
    id: grid_ct_power
    address: 172
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement

  # Inverter AC output values.
  # These describe what the inverter is doing on the AC/output side.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Inverter Power"
    id: inverter_power
    address: 175
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Inverter Voltage"
    address: 154
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Inverter Current"
    address: 164
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Inverter Frequency"
    address: 193
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    skip_updates: 11
    filters:
      - multiply: 0.01

  # Load values.
  # Load Power is the total inverter load register.
  # UPS Essential Power is the separate essential/UPS output register found
  # by comparing debug registers against the inverter screen.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Load Power"
    id: load_power
    address: 178
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "UPS Essential Power"
    id: ups_essential_power
    address: 179
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Load Frequency"
    address: 192
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    skip_updates: 11
    filters:
      - multiply: 0.01

  # Generator / AUX port live value.
  # AUX port is configured as GEN INPUT on this inverter.
  # Reg 166 only shows valid power when a generator is actually running.
  # In v4 this register is isolated from neighbouring reads. The lambda hides
  # small/invalid idle readings and only shows meaningful generator power.
  # Adjust generator_min_valid_power_w in substitutions if your generator has a
  # different realistic minimum output.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Generator Power"
    id: gen_power
    address: 166
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    filters:
      - lambda: "return x < ${generator_min_valid_power_w}.0f ? 0.0f : x;"

  # Calculated: Total Solar Power.
  # Sum of both PV strings - useful for dashboard display.
  - platform: template
    name: "Total Solar Power"
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    update_interval: 5s
    lambda: |-
      if (isnan(id(pv1_power).state) || isnan(id(pv2_power).state))
        return {};
      return id(pv1_power).state + id(pv2_power).state;

  # Calculated: Essential Load Power.
  # Reg 175 mirrors Grid CT on this firmware, so it cannot be used.
  # Energy balance: solar + battery_net + grid_port_power = essential load.
  # grid_power (reg 169) is negative when exporting, positive when importing.
  # battery_power (reg 190) is positive when discharging, negative when charging.
  - platform: template
    name: "Essential Load Power"
    id: essential_load_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    update_interval: 5s
    lambda: |-
      if (isnan(id(pv1_power).state) || isnan(id(pv2_power).state) ||
          isnan(id(battery_power).state) || isnan(id(grid_power).state))
        return {};
      float essential = id(pv1_power).state + id(pv2_power).state +
                        id(battery_power).state + id(grid_power).state;
      return essential > 0.0f ? essential : 0.0f;

  # Temperatures.
  # These are slow-changing, so skip_updates: 11 polls them roughly once a minute.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "DC Transformer Temperature"
    address: 90
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "Â°C"
    device_class: temperature
    state_class: measurement
    skip_updates: 11
    filters:
      - multiply: 0.1
      - offset: -100.0

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Radiator Temperature"
    address: 91
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "Â°C"
    device_class: temperature
    state_class: measurement
    skip_updates: 11
    filters:
      - multiply: 0.1
      - offset: -100.0

  # Daily energy totals.
  # These are cumulative kWh counters for today and do not need 5s polling.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Day PV Energy"
    address: 108
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    skip_updates: 11
    accuracy_decimals: 2
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Day Battery Charge"
    address: 70
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    skip_updates: 11
    accuracy_decimals: 2
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Day Battery Discharge"
    address: 71
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    skip_updates: 11
    accuracy_decimals: 2
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Day Grid Import"
    address: 76
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    skip_updates: 11
    accuracy_decimals: 2
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Day Grid Export"
    address: 77
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    skip_updates: 11
    accuracy_decimals: 2
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Day Load Energy"
    address: 84
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    skip_updates: 11
    accuracy_decimals: 2
    filters:
      - multiply: 0.1

  # Overall state code.
  # 2 normally means Normal; Home Assistant can map this to friendly text.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Overall State Code"
    address: 59
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    state_class: measurement
    skip_updates: 11

# Text sensor version of the inverter state.
# This reads the same state register as Overall State Code, but keeps the raw
# HEXBYTES string for dashboards/debugging.
text_sensor:
  # ESPHome firmware version. Diagnostic only; does not use RS485.
  - platform: version
    name: "ESPHome Version"
    entity_category: diagnostic
    disabled_by_default: true

  # Connected Wi-Fi details. Diagnostic only; does not use RS485.
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "Connected SSID"
      entity_category: diagnostic
      disabled_by_default: true
    mac_address:
      name: "MAC Address"
      entity_category: diagnostic
      disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Overall State"
    address: 59
    force_new_range: true
    register_type: holding
    raw_encode: HEXBYTES
    response_size: 2
    skip_updates: 11

# Binary status sensors.
# Grid Connected reads register 194 bit 0. It is slower than live power values
# because grid status does not need second-by-second updates.
binary_sensor:
  # ESPHome connection status. Diagnostic only; does not use RS485.
  - platform: status
    name: "ESP Status"
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Grid Connected"
    address: 194
    force_new_range: true
    register_type: holding
    bitmask: 0x1
    skip_updates: 5

# Writable inverter settings represented as Home Assistant switches.
# use_write_multiple: true is important for this Sunsynk setup; without it the
# inverter could be read successfully but writes were unreliable.
switch:
  # Main inverter settings. These only change when a user changes them, so
  # skip_updates: 59 polls them roughly every 5 minutes.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Solar Export"
    address: 247
    force_new_range: true
    register_type: holding
    bitmask: 0x1
    use_write_multiple: true
    skip_updates: 59
    retain: false

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Use Timer"
    address: 248
    force_new_range: true
    register_type: holding
    bitmask: 0x1
    use_write_multiple: true
    skip_updates: 59
    retain: false

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Priority Load"
    address: 243
    force_new_range: true
    register_type: holding
    bitmask: 0x1
    use_write_multiple: true
    skip_updates: 59
    retain: false

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Grid Charge Enabled"
    address: 232
    force_new_range: true
    register_type: holding
    bitmask: 0x1
    use_write_multiple: true
    skip_updates: 59
    retain: false

# Writable inverter settings represented as dropdowns.
# Do not add register_type here; ESPHome select/modbus_controller does not accept
# it. use_write_multiple is kept for reliable writes.
select:
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Load Limit"
    address: 244
    force_new_range: true
    value_type: U_WORD
    use_write_multiple: true
    skip_updates: 59
    retain: false
    optionsmap:
      "Allow Export": 0
      "Essentials": 1
      "Zero Export": 2

  # Program charge selects. These are the charge-source settings for each timer
  # slot. skip_updates: 119 polls them roughly every 10 minutes.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Prog1 Charge"
    address: 274
    value_type: U_WORD
    use_write_multiple: true
    force_new_range: true
    skip_updates: 119
    retain: false
    optionsmap:
      "No Grid or Gen": 0
      "Allow Grid": 1
      "Allow Gen": 2
      "Allow Grid & Gen": 3

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Prog2 Charge"
    address: 275
    force_new_range: true
    value_type: U_WORD
    use_write_multiple: true
    skip_updates: 119
    retain: false
    optionsmap:
      "No Grid or Gen": 0
      "Allow Grid": 1
      "Allow Gen": 2
      "Allow Grid & Gen": 3

  - platform: modbus_controller
