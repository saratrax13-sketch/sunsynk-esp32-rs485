substitutions:
  device_name: sunsynk-inverter
  friendly_name: Sunsynk Inverter
  device_description: "ESP32 RS485 bridge for monitoring and controlling a Sunsynk inverter via ESPHome, MQTT, and Home Assistant."
  tx_pin: GPIO16
  rx_pin: GPIO17
  flow_control_pin: GPIO18
  generator_min_valid_power_w: "0"
  generator_max_valid_power_w: "10000"
  generator_confirm_samples: "1"
  pv_string_max_power_w: "20000"
  total_solar_max_power_w: "30000"
  pv_current_min_when_power_a: "0"
  inverter_power_max_w: "20000"
  load_power_max_w: "20000"
  load_power_spike_confirm_w: "20000"
  writable_state_confirm_samples: "3"
  modbus_update_interval: 5s
  modbus_command_throttle: 100ms
  modbus_send_wait_time: 250ms

# File version: v4.16-drift-test - loosened validation thresholds
# Date updated: 2026-05-15
#
# Why this version exists:
# - Earlier versions could read and write, but grouped Modbus range reads sometimes
#   returned shifted/corrupt values on this inverter.
# - v4 keeps the working write fix: use_write_multiple: true on writable registers.
# - v4 keeps decimal display improvements: accuracy_decimals: 2 on voltage/current/
#   frequency/energy sensors where useful.
# - v4 uses force_new_range: true very broadly so most Modbus values are read in
#   separate requests. This is a little slower, but it stopped values being applied
#   to the wrong sensors.
# - MQTT keepalive was reduced to 15s so disconnects are detected faster.
# - MQTT reboot_timeout is set to 0s so the ESP32 does not reboot just because
#   MQTT disconnects.
# - MQTT retain is explicitly disabled on writable switches/selects/numbers.
#   Retained writable state messages can be replayed by MQTT/Home Assistant
#   after reconnects and look like real changes.
# - v4.1 slows RS485 request pacing after logs still showed shifted/corrupt
#   values such as impossible battery SOC and PV voltage readings.
# - v4.2 slows RS485 request pacing further and filters impossible values so
#   dashboards keep the last valid reading instead of publishing corrupt spikes.
# - v4.3 speeds the RS485 pacing back up after v4.2 proved too slow in live use,
#   while keeping the defensive filters.
# - v4.4 moves request spacing to 750ms after 600ms still showed select mapping
#   errors, and tightens filters for generator/PV/inverter-voltage false reads.
# - v4.5 replaces the high fixed generator threshold with a consecutive-sample
#   confirmation filter, so a real generator can be detected without changing
#   the YAML every time it is connected.
# - v4.6 tested faster request spacing now that defensive filters and the
#   confirmed generator filter were in place.
# - v4.7 keeps the faster 5s scan interval but returns RS485 request spacing to
#   750ms after live logs showed clean reads without select mapping errors.
# - v4.8 adds PV power plausibility filters that compare PV watts against
#   voltage x current, preventing shifted values such as SOC or another string's
#   power from being published as PV power.
# - v4.9 extends last-good-value validation to battery, grid, inverter, load,
#   UPS, and calculated power sensors so dashboards are less affected by shifted
#   Modbus reads.
# - v4.10 tightens PV string and total solar limits after live logs showed
#   shifted reads could still pass the wider v4.9 plausibility band.
# - v4.11 adds cross-checks for PV current, suppresses negative inverter power,
#   requires confirmation for sudden high load/UPS samples, and filters invalid
#   state codes.
# - v4.12 adds confirmation to writable switch/select state reads so one shifted
#   Modbus response cannot make Home Assistant show a setting changing by itself.
# - v4.13 fixes the PV current compile substitution and adds the same
#   confirmation pattern to writable battery capacity number reads.
# - v4.14 extends confirmed reads to Prog1-Prog6 Charge selects so shifted
#   values such as 100 do not produce mapping errors or false state changes.
# - v4.15 lowers Modbus request spacing to 250ms after replacing the marginal
#   MAX485 module with a Waveshare 3.3V RS485 board and confirming clean logs
#   with no Modbus, mapping, or corrupt state-code errors.
# - v4.16-drift-test loosens the defensive validation thresholds so the
#   Waveshare RS485 hardware can be tested for raw drift/corruption. This file
#   is for short diagnostic runs only; use v4.15 for normal dashboards.
#
# Polling notes:
# - The main Modbus controller update_interval is ${modbus_update_interval}.
# - No skip_updates means the item is checked every scan.
# - skip_updates: 11 means the item updates every 12 scans.
# - skip_updates: 59 means the item updates every 60 scans.
# - skip_updates: 119 means the item updates every 120 scans.
# - Modbus is serial, so values update one after another, not all at exactly the
#   same instant.

# ESPHome node identity shown in ESPHome Builder and Home Assistant.
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: ${device_description}

# ESP32 board and framework choice.
esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.0"
      sram1_as_iram: true

# Logging levels. Modbus internals are kept quiet unless troubleshooting is needed.
logger:
  level: INFO
  logs:
    modbus: ERROR
    modbus_controller: ERROR
    mqtt: ERROR
    api: ERROR
    sensor: INFO
    number: INFO
    select: INFO
    text_sensor: INFO

# Native Home Assistant API connection.
api:
  reboot_timeout: 0s
  encryption:
    key: !secret sunsynk_api_encryption_key

# OTA lets ESPHome update the ESP32 over Wi-Fi after the first flash.
ota:
  - platform: esphome
    password: !secret sunsynk_ota_password

# Wi-Fi connection. The static IP makes the inverter bridge easy to find.
wifi:
  reboot_timeout: 0s
  ssid: !secret wifi_ssid2
  password: !secret wifi_password2
  fast_connect: true
  power_save_mode: none
  manual_ip:
    static_ip: !secret device_static_ip
    gateway: !secret network_gateway
    subnet: !secret network_subnet
    dns1: !secret network_dns1
  ap:
    ssid: "Sunsynk Fallback Hotspot"
    password: !secret fallback_ap_password_ss

# MQTT publishing is enabled in addition to the native Home Assistant API.
mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  port: !secret mqtt_port
  topic_prefix: sunsynk_inverter
  keepalive: 15s        # detect disconnections faster (default is 60s)
  reboot_timeout: 0s    # do NOT reboot the ESP on MQTT disconnect; prevents false state changes
  log_topic: null       # keep logs off MQTT; use API/ESPHome logs for troubleshooting

# Small web page on the ESP32 for quick local status checks.
web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

# UART wiring from ESP32 to the RS485 converter.
# GPIO16 = TX from ESP32 to converter, GPIO17 = RX from converter to ESP32.
uart:
  - id: mod_uart
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}
    baud_rate: 9600
    stop_bits: 1
    rx_buffer_size: 512

# RS485/Modbus bus settings.
# flow_control_pin controls DE/RE on the RS485 adapter so the ESP32 can switch
# between transmit and receive.
modbus:
  - id: modbus1
    uart_id: mod_uart
    flow_control_pin: ${flow_control_pin}
    send_wait_time: ${modbus_send_wait_time}

# Sunsynk inverter Modbus slave.
# address: 1 must match the inverter Modbus ID.
# command_throttle spaces requests apart to avoid overrunning the inverter.
modbus_controller:
  - id: sunsynk
    address: 1
    modbus_id: modbus1
    setup_priority: -10
    update_interval: ${modbus_update_interval}
    command_throttle: ${modbus_command_throttle}
    offline_skip_updates: 3

# Sensors below are mostly Modbus holding-register reads.
# force_new_range: true is intentionally used broadly in v4 to isolate reads and
# avoid byte-shift/corrupt grouped reads on this inverter.
sensor:
  # ESP32 diagnostics. These do not use RS485 and do not affect inverter polling.
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic
    disabled_by_default: true

  - platform: uptime
    name: "Uptime"
    update_interval: 60s
    entity_category: diagnostic
    disabled_by_default: true

  # Battery live values.
  # SOC is percent. Power is W: positive means discharging, negative means charging.
  # Voltage/current use scaling filters and publish two decimals.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Battery SOC"
    id: battery_soc
    address: 184
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    filters:
      - lambda: |-
          if (x >= 0.0f && x <= 100.0f) return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Battery Power"
    id: battery_power
    address: 190
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    filters:
      - lambda: |-
          if (x < -12000.0f || x > 12000.0f) return {};
          if (isnan(id(battery_voltage).state) || isnan(id(battery_current).state)) return x;
          const float expected = id(battery_voltage).state * id(battery_current).state;
          if (fabsf(expected) < 200.0f) return x;
          const float abs_expected = fabsf(expected);
          const float abs_x = fabsf(x);
          if (abs_x >= abs_expected * 0.35f && abs_x <= abs_expected * 1.75f) return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Battery Voltage"
    id: battery_voltage
    address: 183
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
      - lambda: |-
          if (x >= 40.0f && x <= 65.0f) return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Battery Current"
    id: battery_current
    address: 191
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
      - lambda: |-
          if (x >= -300.0f && x <= 300.0f) return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Battery Temperature"
    address: 182
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "C"
    device_class: temperature
    state_class: measurement
    skip_updates: 11
    filters:
      - multiply: 0.1
      - offset: -100.0
      - lambda: |-
          if (x >= -20.0f && x <= 100.0f) return x;
          return {};

  # Solar PV live values.
  # PV1/PV2 power are read directly; voltage/current use 0.1 scaling.
  # Total Solar Power later adds PV1 + PV2 for dashboard cards.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "PV1 Power"
    id: pv1_power
    address: 186
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    filters:
      - lambda: |-
          if (x < 0.0f || x > ${pv_string_max_power_w}.0f) return {};
          if (isnan(id(pv1_voltage).state) || isnan(id(pv1_current).state)) return x;
          const float expected = id(pv1_voltage).state * id(pv1_current).state;
          if (expected < 200.0f) return x;
          const float low = expected * 0.70f;
          const float high = expected * 1.25f;
          if (x >= low && x <= high) return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "PV2 Power"
    id: pv2_power
    address: 187
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    filters:
      - lambda: |-
          if (x < 0.0f || x > ${pv_string_max_power_w}.0f) return {};
          if (isnan(id(pv2_voltage).state) || isnan(id(pv2_current).state)) return x;
          const float expected = id(pv2_voltage).state * id(pv2_current).state;
          if (expected < 200.0f) return x;
          const float low = expected * 0.70f;
          const float high = expected * 1.25f;
          if (x >= low && x <= high) return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "PV1 Voltage"
    id: pv1_voltage
    address: 109
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.1
      - lambda: |-
          if (x == 0.0f || (x >= 50.0f && x <= 600.0f)) return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "PV1 Current"
    id: pv1_current
    address: 110
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.1
      - lambda: |-
          if (x < 0.0f || x > 50.0f) return {};
          if (!isnan(id(pv1_voltage).state) && !isnan(id(pv1_power).state) &&
              id(pv1_voltage).state > 50.0f && id(pv1_power).state > 500.0f &&
              x < ${pv_current_min_when_power_a}.0f) return {};
          return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "PV2 Voltage"
    id: pv2_voltage
    address: 111
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.1
      - lambda: |-
          if (x == 0.0f || (x >= 50.0f && x <= 600.0f)) return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "PV2 Current"
    id: pv2_current
    address: 112
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.1
      - lambda: |-
          if (x < 0.0f || x > 50.0f) return {};
          if (!isnan(id(pv2_voltage).state) && !isnan(id(pv2_power).state) &&
              id(pv2_voltage).state > 50.0f && id(pv2_power).state > 500.0f &&
              x < ${pv_current_min_when_power_a}.0f) return {};
          return x;
          return {};

  # Grid live values.
  # Grid CT Power is the main CT reading. Grid L1 Power is kept because
  # the Sunsynk power-flow card may use it better for the grid branch on this model.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Grid Voltage"
    address: 150
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.1
      - lambda: |-
          if (x == 0.0f || (x >= 180.0f && x <= 270.0f)) return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Grid Current"
    address: 160
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
      - lambda: |-
          if (x >= -200.0f && x <= 200.0f) return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Grid Frequency"
    address: 79
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    skip_updates: 11
    filters:
      - multiply: 0.01
      - lambda: |-
          if (x == 0.0f || (x >= 45.0f && x <= 55.0f)) return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Grid L1 Power"
    address: 167
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    filters:
      - lambda: |-
          if (x >= -12000.0f && x <= 12000.0f) return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Grid Power"
    id: grid_power
    address: 169
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    filters:
      - lambda: |-
          if (x >= -12000.0f && x <= 12000.0f) return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Grid CT Power"
    id: grid_ct_power
    address: 172
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    filters:
      - lambda: |-
          if (x >= -12000.0f && x <= 12000.0f) return x;
          return {};

  # Inverter AC output values.
  # These describe what the inverter is doing on the AC/output side.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Inverter Power"
    id: inverter_power
    address: 175
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    filters:
      - lambda: |-
          if (x >= 0.0f && x <= ${inverter_power_max_w}.0f) return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Inverter Voltage"
    address: 154
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.1
      - lambda: |-
          if (x == 0.0f || (x >= 180.0f && x <= 270.0f)) return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Inverter Current"
    address: 164
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
      - lambda: |-
          if (x >= 0.0f && x <= 200.0f) return x;
          return {};

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Inverter Frequency"
    address: 193
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    skip_updates: 11
    filters:
      - multiply: 0.01
      - lambda: |-
          if (x == 0.0f || (x >= 45.0f && x <= 55.0f)) return x;
          return {};

  # Load values.
  # Load Power is the total inverter load register.
  # UPS Essential Power is the separate essential/UPS output register found
  # by comparing debug registers against the inverter screen.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Load Power"
    id: load_power
    address: 178
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - lambda: |-
          static int high_count = 0;
          if (x < 0.0f || x > ${load_power_max_w}.0f) {
            high_count = 0;
            return {};
          }
          if (x >= ${load_power_spike_confirm_w}.0f) {
            high_count++;
            if (high_count >= 2) return x;
            return {};
          }
          high_count = 0;
          return x;

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "UPS Essential Power"
    id: ups_essential_power
    address: 179
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - lambda: |-
          static int high_count = 0;
          if (x < 0.0f || x > ${load_power_max_w}.0f) {
            high_count = 0;
            return {};
          }
          if (x >= ${load_power_spike_confirm_w}.0f) {
            high_count++;
            if (high_count >= 2) return x;
            return {};
          }
          high_count = 0;
          return x;

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Load Frequency"
    address: 192
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    skip_updates: 11
    filters:
      - multiply: 0.01
      - lambda: |-
          if (x == 0.0f || (x >= 45.0f && x <= 55.0f)) return x;
          return {};

  # Generator / AUX port live value.
  # AUX port is configured as GEN INPUT on this inverter.
  # Reg 166 only shows valid power when a generator is actually running.
  # In v4 this register is isolated from neighbouring reads. The lambda hides
  # small/invalid idle readings and only shows meaningful generator power.
  # A real generator must produce generator_confirm_samples consecutive readings
  # between generator_min_valid_power_w and generator_max_valid_power_w before
  # the value is published. This hides one-off shifted Modbus values when no
  # generator is connected without needing a manual YAML change later.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Generator Power"
    id: gen_power
    address: 166
    force_new_range: true
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    filters:
      - lambda: |-
          static int valid_count = 0;
          if (x < ${generator_min_valid_power_w}.0f || x > ${generator_max_valid_power_w}.0f) {
            valid_count = 0;
            return 0.0f;
          }
          valid_count++;
          if (valid_count >= ${generator_confirm_samples}) return x;
          return 0.0f;

  # Calculated: Total Solar Power.
  # Sum of both PV strings - useful for dashboard display.
  - platform: template
    name: "Total Solar Power"
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    update_interval: ${modbus_update_interval}
    lambda: |-
      if (isnan(id(pv1_power).state) || isnan(id(pv2_power).state))
        return {};
      const float total = id(pv1_power).state + id(pv2_power).state;
      if (total >= 0.0f && total <= ${total_solar_max_power_w}.0f) return total;
      return {};

  # Calculated: Essential Load Power.
  # Reg 175 mirrors Grid CT on this firmware, so it cannot be used.
  # Energy balance: solar + battery_net + grid_port_power = essential load.
  # grid_power (reg 169) is negative when exporting, positive when importing.
  # battery_power (reg 190) is positive when discharging, negative when charging.
  - platform: template
    name: "Essential Load Power"
    id: essential_load_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    update_interval: ${modbus_update_interval}
    lambda: |-
      if (isnan(id(pv1_power).state) || isnan(id(pv2_power).state) ||
          isnan(id(battery_power).state) || isnan(id(grid_power).state))
        return {};
      float essential = id(pv1_power).state + id(pv2_power).state +
                        id(battery_power).state + id(grid_power).state;
      if (essential < 0.0f) return 0.0f;
      if (essential <= 12000.0f) return essential;
      return {};

