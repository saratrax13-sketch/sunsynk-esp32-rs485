    register_type: holding
    value_type: U_WORD
    use_write_multiple: true
    min_value: 0
    max_value: 100
    step: 1
    unit_of_measurement: "%"
    skip_updates: 119
    retain: false
    lambda: |-
      static bool initialized = false;
      static float stable_value = 0.0f;
      static float pending_value = 0.0f;
      static int pending_count = 0;
      if (x < 0.0f || x > 100.0f) {
        if (initialized) return stable_value;
        return 10.0f;
      }
      if (!initialized) {
        initialized = true;
        stable_value = x;
        pending_value = x;
        return stable_value;
      }
      if (x == stable_value) {
        pending_value = x;
        pending_count = 0;
        return stable_value;
