# Text sensor version of the inverter state.
# This reads the same state register as Overall State Code, but keeps the raw
# HEXBYTES string for dashboards/debugging.
text_sensor:
  # ESPHome firmware version. Diagnostic only; does not use RS485.
  - platform: version
    name: "ESPHome Version"
    entity_category: diagnostic
    disabled_by_default: true

  # Connected Wi-Fi details. Diagnostic only; does not use RS485.
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "Connected SSID"
      entity_category: diagnostic
      disabled_by_default: true
    mac_address:
      name: "MAC Address"
      entity_category: diagnostic
      disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Overall State"
    address: 59
    force_new_range: true
    register_type: holding
    raw_encode: HEXBYTES
    response_size: 2
    skip_updates: 11

# Binary status sensors.
# Grid Connected reads register 194 bit 0. It is slower than live power values
# because grid status does not need second-by-second updates.
binary_sensor:
  # ESPHome connection status. Diagnostic only; does not use RS485.
  - platform: status
    name: "ESP Status"
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Grid Connected"
    address: 194
    force_new_range: true
    register_type: holding
    bitmask: 0x1
    skip_updates: 5

# Writable inverter settings represented as Home Assistant switches.
# use_write_multiple: true is important for this Sunsynk setup; without it the
# inverter could be read successfully but writes were unreliable.
switch:
  # Main inverter settings. These only change when a user changes them, so
  # skip_updates: 59 polls them roughly every 5 minutes.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Solar Export"
    address: 247
    force_new_range: true
    register_type: holding
    bitmask: 0x1
    use_write_multiple: true
    skip_updates: 59
    retain: false
    lambda: |-
      static bool initialized = false;
      static bool stable_state = false;
      static bool pending_state = false;
      static int pending_count = 0;
      bool read_state = (((uint16_t) x) & 0x1) != 0;
      if (!initialized) {
        initialized = true;
        stable_state = read_state;
        pending_state = read_state;
        return stable_state;
      }
      if (read_state == stable_state) {
        pending_state = read_state;
        pending_count = 0;
        return stable_state;
      }
      if (read_state != pending_state) {
        pending_state = read_state;
        pending_count = 1;
      } else {
        pending_count++;
      }
      if (pending_count >= ${writable_state_confirm_samples}) {
        stable_state = read_state;
        pending_count = 0;
      }
      return stable_state;

