# Writable numeric inverter settings.
# These become Home Assistant number sliders/inputs. use_write_multiple keeps
# writes compatible with the inverter.
number:
  # Battery capacity thresholds. Polled roughly every 10 minutes because these
  # settings rarely change on their own.
  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Battery Shutdown Capacity"
    address: 217
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    use_write_multiple: true
    min_value: 0
    max_value: 100
    step: 1
    unit_of_measurement: "%"
    skip_updates: 119
    retain: false
    lambda: |-
      static bool initialized = false;
      static float stable_value = 0.0f;
      static float pending_value = 0.0f;
      static int pending_count = 0;
      if (x < 0.0f || x > 100.0f) {
        if (initialized) return stable_value;
        return 5.0f;
      }
      if (!initialized) {
        initialized = true;
        stable_value = x;
        pending_value = x;
        return stable_value;
      }
      if (x == stable_value) {
        pending_value = x;
        pending_count = 0;
        return stable_value;
      }
      if (x != pending_value) {
        pending_value = x;
        pending_count = 1;
      } else {
        pending_count++;
      }
      if (pending_count >= ${writable_state_confirm_samples}) {
        stable_value = x;
        pending_count = 0;
      }
      return stable_value;

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Battery Restart Capacity"
    address: 218
    force_new_range: true
    register_type: holding
    value_type: U_WORD
    use_write_multiple: true
    min_value: 0
    max_value: 100
    step: 1
    unit_of_measurement: "%"
    skip_updates: 119
    retain: false
    lambda: |-
      static bool initialized = false;
      static float stable_value = 0.0f;
      static float pending_value = 0.0f;
      static int pending_count = 0;
      if (x < 0.0f || x > 100.0f) {
        if (initialized) return stable_value;
        return 10.0f;
      }
      if (!initialized) {
        initialized = true;
        stable_value = x;
        pending_value = x;
        return stable_value;
      }
      if (x == stable_value) {
        pending_value = x;
        pending_count = 0;
        return stable_value;
      }
      if (x != pending_value) {
        pending_value = x;
        pending_count = 1;
      } else {
        pending_count++;
      }
      if (pending_count >= ${writable_state_confirm_samples}) {
        stable_value = x;
        pending_count = 0;
      }
      return stable_value;

  - platform: modbus_controller
    modbus_controller_id: sunsynk
    name: "Battery Low Capacity"
