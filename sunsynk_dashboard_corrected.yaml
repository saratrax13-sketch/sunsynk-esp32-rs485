                - type: custom:mushroom-entity-card
                  entity: select.sunsynk_inverter_prog1_charge
                  name: " "
                  fill_container: false
                  icon_type: none
                - type: custom:mushroom-entity-card
                  entity: number.sunsynk_inverter_prog1_power
                  name: " "
                  icon_type: none
            - type: gauge
              entity: number.sunsynk_inverter_prog1_capacity
              name: " "
              needle: false
