# Minimal Home Assistant configuration.yaml example for this Sunsynk project.
# With sunsynk-inverter-v4.18.yaml, Sunsynk dashboard helper sensors are created
# by ESPHome, so no Home Assistant template: block is required for Sunsynk.

# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder.
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
